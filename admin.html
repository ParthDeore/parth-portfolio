<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Admin — Parth Portfolio</title>
<style>
  :root { --accent: #149ddd; --bg: #f6f8fa; --border: #e1e5ea; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    color: #272829;
  }
  header {
    background: #040b14;
    color: #fff;
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 18px; margin: 0; }
  #logout-btn {
    background: transparent;
    border: 1px solid #444;
    color: #eaebf0;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
  }
  main { max-width: 1000px; margin: 0 auto; padding: 24px; }
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .card h2 { margin-top: 0; font-size: 17px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: #6c757d; font-weight: 600; }
  button {
    cursor: pointer;
    border: 0;
    border-radius: 4px;
    padding: 5px 10px;
    font-size: 13px;
    margin-right: 5px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger { background: #e34e4e; color: #fff; }
  .btn-secondary { background: #eee; color: #333; }
  input, textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  #login-screen {
    max-width: 360px;
    margin: 80px auto;
    text-align: center;
  }
  #status-msg { font-size: 13px; color: var(--accent); min-height: 18px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; color: #fff; }
  .badge-pending { background: #f0a500; }
  .badge-approved { background: #2fb380; }
  .badge-rejected { background: #999; }
  .unread { font-weight: 700; }
</style>
</head>
<body>

<div id="login-screen" class="card">
  <h2>Admin Login</h2>
  <input type="password" id="admin-key-input" placeholder="Enter admin key">
  <button class="btn-primary" style="width:100%" onclick="login()">Log In</button>
  <p id="login-error" style="color:#e34e4e; font-size:13px;"></p>
</div>

<div id="dashboard" style="display:none;">
  <header>
    <h1>Portfolio Admin</h1>
    <button id="logout-btn" onclick="logout()">Log Out</button>
  </header>

  <main>
    <p id="status-msg"></p>

    <!-- Messages -->
    <div class="card">
      <h2>Contact Messages</h2>
      <table id="messages-table">
        <thead><tr><th>From</th><th>Subject / Message</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Testimonials -->
    <div class="card">
      <h2>Testimonials</h2>
      <table id="testimonials-table">
        <thead><tr><th>Name</th><th>Message</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Blog -->
    <div class="card">
      <h2>Add Blog Post</h2>
      <input type="text" id="blog-title" placeholder="Title">
      <input type="text" id="blog-image" placeholder="Cover image URL (optional)">
      <textarea id="blog-content" rows="4" placeholder="Content"></textarea>
      <button class="btn-primary" onclick="createBlogPost()">Publish Post</button>
    </div>

    <div class="card">
      <h2>Existing Blog Posts</h2>
      <table id="blog-table">
        <thead><tr><th>Title</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>
</div>

<script>
const API_BASE_URL = "https://parth-portfolio-wtdj.onrender.com";
let ADMIN_KEY = sessionStorage.getItem("admin_key") || "";

function login() {
  ADMIN_KEY = document.getElementById("admin-key-input").value.trim();
  if (!ADMIN_KEY) return;
  sessionStorage.setItem("admin_key", ADMIN_KEY);
  verifyAndEnter();
}

function logout() {
  sessionStorage.removeItem("admin_key");
  ADMIN_KEY = "";
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("login-screen").style.display = "block";
}

async function verifyAndEnter() {
  try {
    const res = await fetch(`${API_BASE_URL}/api/admin/messages`, {
      headers: { "X-Admin-Key": ADMIN_KEY }
    });
    if (!res.ok) throw new Error("Invalid key");
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadAll();
  } catch (err) {
    document.getElementById("login-error").textContent = "Invalid admin key or backend unreachable.";
  }
}

function authHeaders(extra = {}) {
  return { "X-Admin-Key": ADMIN_KEY, ...extra };
}

function setStatus(msg) {
  const el = document.getElementById("status-msg");
  el.textContent = msg;
  setTimeout(() => (el.textContent = ""), 3000);
}

async function loadAll() {
  loadMessages();
  loadTestimonials();
  loadBlogPosts();
}

/* ---------- Messages ---------- */
async function loadMessages() {
  const res = await fetch(`${API_BASE_URL}/api/admin/messages`, { headers: authHeaders() });
  const items = await res.json();
  const tbody = document.querySelector("#messages-table tbody");
  tbody.innerHTML = items.map(m => `
    <tr class="${m.is_read ? '' : 'unread'}">
      <td>${escapeHtml(m.name)}<br><small>${escapeHtml(m.email)}</small></td>
      <td><strong>${escapeHtml(m.subject || "")}</strong><br>${escapeHtml(m.message)}</td>
      <td>${new Date(m.created_at).toLocaleString()}</td>
      <td>
        <button class="btn-primary" onclick="replyToMessage('${escapeAttr(m.email)}', '${escapeAttr(m.subject || '')}', '${escapeAttr(m.name)}', '${escapeAttr(m.message)}')">Reply</button>
        ${!m.is_read ? `<button class="btn-secondary" onclick="markRead(${m.id})">Mark read</button>` : ""}
        <button class="btn-danger" onclick="deleteMessage(${m.id})">Delete</button>
      </td>
    </tr>`).join("") || `<tr><td colspan="4">No messages yet.</td></tr>`;
}
async function markRead(id) {
  await fetch(`${API_BASE_URL}/api/admin/messages/${id}/read`, { method: "PATCH", headers: authHeaders() });
  loadMessages();
}
async function deleteMessage(id) {
  if (!confirm("Delete this message?")) return;
  await fetch(`${API_BASE_URL}/api/admin/messages/${id}`, { method: "DELETE", headers: authHeaders() });
  loadMessages();
  setStatus("Message deleted.");
}

/* ---------- Testimonials ---------- */
async function loadTestimonials() {
  const res = await fetch(`${API_BASE_URL}/api/admin/testimonials`, { headers: authHeaders() });
  const items = await res.json();
  const tbody = document.querySelector("#testimonials-table tbody");
  tbody.innerHTML = items.map(t => `
    <tr>
      <td>${escapeHtml(t.name)}${t.role ? `<br><small>${escapeHtml(t.role)}</small>` : ""}</td>
      <td>${escapeHtml(t.message)}</td>
      <td><span class="badge badge-${t.status}">${t.status}</span></td>
      <td>
        ${t.status !== "approved" ? `<button class="btn-primary" onclick="setTestimonialStatus(${t.id}, 'approved')">Approve</button>` : ""}
        ${t.status !== "rejected" ? `<button class="btn-secondary" onclick="setTestimonialStatus(${t.id}, 'rejected')">Reject</button>` : ""}
        <button class="btn-danger" onclick="deleteTestimonial(${t.id})">Delete</button>
      </td>
    </tr>`).join("") || `<tr><td colspan="4">No testimonials yet.</td></tr>`;
}
async function setTestimonialStatus(id, status) {
  await fetch(`${API_BASE_URL}/api/admin/testimonials/${id}`, {
    method: "PATCH",
    headers: authHeaders({ "Content-Type": "application/json" }),
    body: JSON.stringify({ status })
  });
  loadTestimonials();
  setStatus(`Testimonial ${status}.`);
}
async function deleteTestimonial(id) {
  if (!confirm("Delete this testimonial?")) return;
  await fetch(`${API_BASE_URL}/api/admin/testimonials/${id}`, { method: "DELETE", headers: authHeaders() });
  loadTestimonials();
  setStatus("Testimonial deleted.");
}

/* ---------- Blog ---------- */
async function loadBlogPosts() {
  const res = await fetch(`${API_BASE_URL}/api/blog`);
  const items = await res.json();
  const tbody = document.querySelector("#blog-table tbody");
  tbody.innerHTML = items.map(p => `
    <tr>
      <td>${escapeHtml(p.title)}</td>
      <td>${new Date(p.created_at).toLocaleDateString()}</td>
      <td><button class="btn-danger" onclick="deleteBlogPost(${p.id})">Delete</button></td>
    </tr>`).join("") || `<tr><td colspan="3">No posts yet.</td></tr>`;
}
async function createBlogPost() {
  const title = document.getElementById("blog-title").value.trim();
  const content = document.getElementById("blog-content").value.trim();
  const cover_image_url = document.getElementById("blog-image").value.trim() || null;
  if (!title || !content) return setStatus("Title and content are required.");

  const res = await fetch(`${API_BASE_URL}/api/admin/blog`, {
    method: "POST",
    headers: authHeaders({ "Content-Type": "application/json" }),
    body: JSON.stringify({ title, content, cover_image_url })
  });
  if (res.ok) {
    document.getElementById("blog-title").value = "";
    document.getElementById("blog-content").value = "";
    document.getElementById("blog-image").value = "";
    loadBlogPosts();
    setStatus("Post published.");
  } else {
    setStatus("Could not publish post.");
  }
}
async function deleteBlogPost(id) {
  if (!confirm("Delete this post?")) return;
  await fetch(`${API_BASE_URL}/api/admin/blog/${id}`, { method: "DELETE", headers: authHeaders() });
  loadBlogPosts();
  setStatus("Post deleted.");
}

function replyToMessage(email, subject, name, originalMessage) {
  const replySubject = subject ? `Re: ${subject}` : "Re: your message";
  const quoted = originalMessage
    .split("\n")
    .map(line => `> ${line}`)
    .join("\n");
  const body = `Hi ${name},\n\n\n\n---\nYou wrote:\n${quoted}`;
  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}&su=${encodeURIComponent(replySubject)}&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl, "_blank");
}

function escapeAttr(str) {
  return (str ?? "").replace(/'/g, "&#39;").replace(/"/g, "&quot;");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str ?? "";
  return div.innerHTML;
}

if (ADMIN_KEY) verifyAndEnter();
</script>
</body>
</html>
